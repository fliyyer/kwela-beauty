name: Deploy to cPanel Shared Hosting (Zip Method)

on:
  push:
    branches:
      - main # Trigger deployment when pushing to main branch

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout Code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup PHP environment
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3" # Match your cPanel hosting PHP version
          extensions: mbstring, xml, ctype, iconv, intl, bcmath, pdo, sqlite, zip
          coverage: none

      # 3. Install Composer Dependencies (Optimized for Production)
      - name: Install Composer Dependencies
        run: |
          composer install --no-ansi --no-dev --no-interaction --no-plugins --no-progress --no-scripts --optimize-autoloader

      # 4. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 5. Install & Build Frontend Assets (Vite Production Build)
      - name: Build Assets
        run: |
          npm ci
          npm run build

      # 6. Modify public/index.php paths for cPanel split directory structure before deploying
      - name: Adapt index.php for Shared Hosting
        run: |
          sed -i "s|__DIR__.'/../vendor/autoload.php'|__DIR__.'/../kwela-beauty/vendor/autoload.php'|g" public/index.php
          sed -i "s|__DIR__.'/../bootstrap/app.php'|__DIR__.'/../kwela-beauty/bootstrap/app.php'|g" public/index.php
          sed -i "s|__DIR__.'/../storage/framework/maintenance.php'|__DIR__.'/../kwela-beauty/storage/framework/maintenance.php'|g" public/index.php

      # 7. Create Deployment Archives
      # This packs core files (including vendor) and public files separately
      - name: Create Deployment Archives
        run: |
          # Zip the Laravel core engine (including vendor)
          zip -r public/project.zip . -x "public/*" "node_modules/*" ".git/*" ".github/*" "tests/*" "phpunit.xml" ".env"

          # Zip the public assets
          cd public
          zip -r public.zip . -x "project.zip"
          cd ..

      # 8. Generate Unzip Script
      - name: Generate Unzip Script
        run: |
          cat << 'EOF' > public/unzip.php
          <?php
          $secret = $_GET['secret'] ?? '';
          if (empty($secret) || $secret !== 'kiwil') {
              header('HTTP/1.0 403 Forbidden');
              echo 'Forbidden';
              exit;
          }

          $zipFiles = [
              'project.zip' => '/home/kwec8243/kwela-beauty',
              'public.zip' => '/home/kwec8243/public_html'
          ];

          $errors = [];
          foreach ($zipFiles as $zipFile => $extractTo) {
              $zipPath = '/home/kwec8243/public_html/' . $zipFile;
              if (file_exists($zipPath)) {
                  $zip = new ZipArchive;
                  if ($zip->open($zipPath) === TRUE) {
                      if (!is_dir($extractTo)) {
                          mkdir($extractTo, 0755, true);
                      }
                      $zip->extractTo($extractTo);
                      $zip->close();
                      echo "Successfully extracted $zipFile to $extractTo\n";
                      unlink($zipPath); // Delete the zip file after extraction
                  } else {
                      $errors[] = "Failed to open $zipFile";
                  }
              } else {
                  $errors[] = "$zipFile not found at $zipPath";
              }
          }

          // Self-destruct unzip script
          unlink(__FILE__);

          if (!empty($errors)) {
              header('HTTP/1.0 500 Internal Server Error');
              echo implode("\n", $errors);
              exit;
          }
          echo "Extraction completed successfully!";
          EOF

      # 9. Upload Deployment Package to Server via cURL FTP (Fast & Reliable)
      # This completely bypasses git-ftp cache/untracked file limitations
      - name: Upload Files via FTP
        run: |
          TARGET_DIR="${{ secrets.FTP_TARGET_DIR || 'public_html/' }}"
          # Ensure trailing slash
          [[ "$TARGET_DIR" != */ ]] && TARGET_DIR="$TARGET_DIR/"
          
          echo "Uploading project.zip..."
          curl --ftp-create-dirs -T public/project.zip -u "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" "ftp://${{ secrets.FTP_SERVER }}/$TARGET_DIR"project.zip
          
          echo "Uploading public.zip..."
          curl --ftp-create-dirs -T public/public.zip -u "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" "ftp://${{ secrets.FTP_SERVER }}/$TARGET_DIR"public.zip
          
          echo "Uploading unzip.php..."
          curl --ftp-create-dirs -T public/unzip.php -u "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" "ftp://${{ secrets.FTP_SERVER }}/$TARGET_DIR"unzip.php
          
          echo "Uploading debug.php..."
          curl --ftp-create-dirs -T public/debug.php -u "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" "ftp://${{ secrets.FTP_SERVER }}/$TARGET_DIR"debug.php

      # 10. Trigger Remote Extraction
      - name: Trigger Remote Extraction
        run: |
          curl -sSf "${{ secrets.DEPLOY_URL }}/unzip.php?secret=kiwil"

